# 复制到服务器：/etc/nginx/sites-available/99ka.life
# sudo ln -s /etc/nginx/sites-available/99ka.life /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name 99ka.life;

    ssl_certificate     /etc/letsencrypt/live/99ka.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/99ka.life/privkey.pem;

    # 飞书 / Lark 事件回调 → telegram_listener.py :8081
    location /feishu/event {
        proxy_pass http://127.0.0.1:8081/feishu/event;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /feishu/health {
        proxy_pass http://127.0.0.1:8081/health;
    }
}

server {
    listen 80;
    server_name 99ka.life;
    return 301 https://$host$request_uri;
}
